# Org Ontology Schema v1
# Machine-readable organizational intelligence layer
# Generated by /org-map — edit directly or run /org-map --resume
#
# Design principles:
#   - Actions (verbs) over descriptions (adjectives)
#   - Exceptions over happy paths
#   - Honest incompleteness over false confidence
#   - Dense and structured over verbose and prosaic

meta:
  org: ""                          # Organization name
  domain: ""                       # Industry/vertical (e.g., "B2B SaaS", "Healthcare", "Fintech")
  stage: ""                        # startup | growth | scale | enterprise
  headcount: 0                     # Approximate team size
  captured: ""                     # ISO date of capture
  version: 1                       # Increment on major updates
  completeness:                    # Honest self-assessment per section (0.0-1.0)
    foundation: 0.0
    processes: 0.0
    decisions: 0.0
    knowledge: 0.0
    constraints: 0.0
  notes: ""                        # Capture context (who was interviewed, what was skipped, etc.)

entities:
  roles:
    - id: ""                       # Unique slug (e.g., "eng-lead", "head-of-product")
      title: ""                    # Human-readable title
      team: ""                     # Team ID reference
      authority:
        approves: []               # What this role can greenlight (reference decision IDs)
        creates: []                # What this role produces (artifacts, processes)
        escalates_to: ""           # Role ID they escalate to
      context_needs: []            # What information they need to do their job
      tribal_knowledge: ""         # What they know that isn't written down (empty = none identified)
      bus_factor_for: []           # Process IDs that depend heavily on this person

  teams:
    - id: ""                       # Unique slug
      name: ""                     # Human-readable name
      type: ""                     # stream-aligned | platform | enabling | complicated-subsystem (Team Topologies)
      owns: []                     # Domains/capabilities this team is responsible for
      headcount: 0
      interacts_with:
        - team: ""                 # Team ID
          mode: ""                 # collaboration | x-as-a-service | facilitating
          friction: ""             # none | low | moderate | high — honest assessment
          notes: ""                # What's working or broken about this interaction

  systems:
    - id: ""                       # Unique slug (e.g., "github", "slack", "salesforce")
      name: ""                     # Product name
      type: ""                     # communication | project-management | code | data | crm | erp | custom | other
      used_by: []                  # Team IDs
      actions: []                  # What can be done IN this system (verbs: "create-ticket", "approve-pr", "send-message")
      data: []                     # What data lives here
      integrations: []             # System IDs it connects to
      notes: ""                    # Quirks, workarounds, known limitations

processes:
  - id: ""                         # Unique slug (e.g., "feature-development", "incident-response")
    name: ""                       # Human-readable name
    owner: ""                      # Role ID — who is accountable for this process working
    trigger:
      type: ""                     # event | schedule | request | threshold | manual
      description: ""              # What specifically starts this process
    value_chain_position: ""       # core | supporting | commodity (Wardley)
    frequency: ""                  # How often this runs (e.g., "~5x/week", "quarterly", "on-demand")
    typical_duration: ""           # Real duration, not the SLA
    steps:
      - actor: ""                  # Role ID
        action: ""                 # Verb — what they do
        system: ""                 # System ID (optional — some steps are offline)
        output: ""                 # What this step produces
        duration: ""               # How long this step actually takes
        notes: ""                  # Context, gotchas
    decisions:
      - id: ""                     # Unique within this process
        point: ""                  # Which step this decision occurs at (or "pre" / "post")
        owner: ""                  # Role ID — who actually decides
        criteria: []               # What they evaluate (concrete, not abstract)
        options:                   # Possible outcomes with what happens next
          - label: ""
            next: ""               # Next step or process state
        historical_pattern: ""     # How the org tends to decide this (optional but high-value)
    exceptions:
      - condition: ""              # What triggers this exception
        frequency: ""              # How often it happens
        handler: ""                # Role ID — who deals with it
        override: ""               # What changes vs. the normal path
        documentation: ""          # none | partial | complete — is this written down anywhere?
    handoffs:
      - from: ""                   # Role ID
        to: ""                     # Role ID
        mechanism: ""              # How (e.g., "Slack message", "Jira ticket assignment", "meeting")
        context_loss: ""           # What gets lost in translation (empty = clean handoff)
    bus_factor: 0                  # How many people can execute this end-to-end
    last_broke: ""                 # When and how (optional but revealing)
    new_hire_gotcha: ""            # What a new person would get wrong

decisions:
  # Org-wide decision patterns (not tied to a single process)
  - id: ""                         # Unique slug
    name: ""                       # Human-readable (e.g., "Architecture decisions", "Hiring")
    owner: ""                      # Role ID
    trigger: ""                    # What prompts this decision
    inputs: []                     # Data/context needed
    criteria:
      primary: []                  # Must-haves
      secondary: []                # Nice-to-haves
    process: ""                    # sync-meeting | async-doc | hybrid | ad-hoc
    typical_duration: ""           # How long decisions of this type take
    output: ""                     # What gets produced (decision doc, announcement, etc.)
    escalation:
      trigger: ""                  # When does it escalate
      to: ""                       # Role ID
    historical_pattern: ""         # How the org tends to decide (conservative, fast-and-fix, data-driven, etc.)
    failure_mode: ""               # When has this type of decision gone wrong, and why

knowledge:
  flows:
    - id: ""                       # Unique slug
      name: ""                     # Human-readable
      source: ""                   # Role ID or team ID
      channel: ""                  # How it moves (system, meeting type, ritual)
      destination: ""              # Role ID or team ID
      frequency: ""                # How often
      artifact: ""                 # What gets produced (if anything)
      gap: ""                      # What gets lost or filtered (empty = clean flow)

  tribal:
    - area: ""                     # Domain of knowledge
      holders: []                  # Role IDs of people who hold this knowledge
      risk: ""                     # What happens if these people leave
      documentation: ""            # none | partial | scattered | complete
      extraction_difficulty: ""    # low | medium | high — how hard would it be to document this

  rituals:
    - name: ""                     # e.g., "Monday standup", "Quarterly planning", "Incident retro"
      frequency: ""
      participants: []             # Role IDs
      purpose: ""                  # What it actually accomplishes (not the stated purpose)
      effectiveness: ""            # low | medium | high — does it achieve its purpose?
      artifact: ""                 # What gets produced (if anything)

  gaps:                            # Explicit list of known knowledge gaps
    - area: ""
      impact: ""                   # low | medium | high | critical
      description: ""
      recommended_action: ""

constraints:
  compliance: []                   # Regulatory frameworks (SOC2, GDPR, HIPAA, PCI-DSS, etc.)
  slas:
    - process: ""                  # Process ID
      metric: ""                   # What's measured
      target: ""                   # The commitment
      reality: ""                  # What actually happens
  policies:
    - id: ""
      description: ""              # The rule
      enforced_by: ""              # code | process | honor-system | not-enforced
      exceptions: ""               # When can this be overridden, and by whom
